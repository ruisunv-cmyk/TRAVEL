<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey Map | Travel Tracker for Two</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f0e8 0%, #e8e4db 100%);
            font-family: 'Inter', sans-serif;
            color: #2c2a28;
            min-height: 100vh;
        }
        .header {
            background: rgba(254, 252, 248, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e8e4db;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #8b5e3c;
        }
        .logo i { margin-right: 10px; color: #c9a88b; }
        .logo span {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: #9e9b92;
            margin-left: 16px;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 24px;
            border: none;
            background: transparent;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            color: #6b6a64;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: #f0ede6;
            color: #8b5e3c;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 40px;
        }
        .map-container {
            background: #1a1a2e;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid #e8e4db;
        }
        #map {
            height: 500px;
            width: 100%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #fefcf8;
            padding: 20px;
            border-bottom: 2px solid #e8e4db;
            text-align: center;
        }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        .stat-icon.green { color: #4a9b6e; }
        .stat-icon.blue { color: #5b8cc9; }
        .stat-icon.orange { color: #e8a34b; }
        .stat-icon.gold { color: #d4af37; }
        .stat-value { font-size: 32px; font-weight: 600; font-family: 'Cormorant Garamond', serif; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9e9b92; margin-top: 8px; }
        .card {
            background: #fefcf8;
            padding: 28px;
            margin-bottom: 32px;
            border-bottom: 1px solid #e8e4db;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 500;
            color: #3d3a34;
        }
        .btn-primary {
            background: transparent;
            color: #8b5e3c;
            border: 1px solid #d4cfc4;
            padding: 10px 26px;
            font-weight: 500;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.25s;
        }
        .btn-primary:hover { background: #8b5e3c; color: #fefcf8; border-color: #8b5e3c; }
        .btn-secondary {
            background: transparent;
            color: #9e9b92;
            border: 1px solid #e0dcd2;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 11px;
        }
        .destination-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0ede6;
            cursor: pointer;
            transition: all 0.2s;
        }
        .destination-item:hover { background: #faf8f3; transform: translateX(5px); }
        .destination-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
        }
        .badge-together { background: #4a9b6e; box-shadow: 0 0 0 2px rgba(74,155,110,0.2); }
        .badge-me { background: #5b8cc9; }
        .badge-him { background: #e8a34b; }
        .badge-dream { background: #d4af37; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(43, 42, 40, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fefcf8;
            padding: 40px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 24px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #9e9b92;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0dcd2;
            background: transparent;
            font-size: 13px;
            border-radius: 8px;
        }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .photo-preview {
            width: 100%;
            height: 150px;
            background: #f0ede6;
            border-radius: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .filter-buttons { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px;
            border: 1px solid #e0dcd2;
            background: transparent;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .filter-btn.active { background: #e8e4db; border-color: #c9b896; }
        @media (max-width: 768px) { .container { padding: 20px; } .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <div class="logo"><i class="fas fa-heart"></i> OUR JOURNEY MAP <span>Together & Apart</span></div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-page="map">🗺️ World Map</button>
            <button class="nav-tab" data-page="destinations">📍 Destinations</button>
            <button class="nav-tab" data-page="bucketlist">⭐ Bucket List</button>
            <button class="nav-tab" data-page="stats">📊 Statistics</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="mapPage" class="page active">
        <div class="map-container">
            <div id="map"></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon green">🏠</div><div class="stat-value" id="togetherCount">0</div><div class="stat-label">Visited Together</div></div>
            <div class="stat-card"><div class="stat-icon blue">👩</div><div class="stat-value" id="meCount">0</div><div class="stat-label">You visited</div></div>
            <div class="stat-card"><div class="stat-icon orange">👨</div><div class="stat-value" id="himCount">0</div><div class="stat-label">He visited</div></div>
            <div class="stat-card"><div class="stat-icon gold">✨</div><div class="stat-value" id="dreamCount">0</div><div class="stat-label">Dream Together</div></div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title"><i class="fas fa-map-pin"></i> Featured Memories</div><button class="btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Destination</button></div>
            <div id="featuredList"></div>
        </div>
    </div>

    <div id="destinationsPage" class="page">
        <div class="card">
            <div class="card-header"><div class="card-title"><i class="fas fa-flag-checkered"></i> All Destinations</div></div>
            <div class="filter-buttons" id="destinationFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="together">Together ❤️</button>
                <button class="filter-btn" data-filter="me">You alone 👩</button>
                <button class="filter-btn" data-filter="him">Him alone 👨</button>
                <button class="filter-btn" data-filter="dream">Dream ✨</button>
            </div>
            <div id="allDestinationsList"></div>
        </div>
    </div>

    <div id="bucketlistPage" class="page">
        <div class="card">
            <div class="card-header"><div class="card-title"><i class="fas fa-star"></i> Our Dream Destinations</div><button class="btn-primary" onclick="openAddModalWithType('dream')"><i class="fas fa-plus"></i> Add Dream</button></div>
            <div id="bucketListContainer"></div>
        </div>
    </div>

    <div id="statsPage" class="page">
        <div class="card">
            <div class="card-header"><div class="card-title"><i class="fas fa-chart-line"></i> Travel Statistics</div></div>
            <canvas id="travelChart" style="max-height: 300px; margin-bottom: 32px;"></canvas>
            <div id="statDetails"></div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="destinationModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 24px; font-family: 'Cormorant Garamond', serif; font-size: 26px;" id="modalTitle">Add Destination</h3>
        <div class="form-group"><label>Country/City</label><input type="text" id="destName" placeholder="e.g., Paris, France"></div>
        <div class="form-group"><label>Type of Visit</label><select id="destType">
            <option value="together">Together ❤️</option>
            <option value="me">You only 👩</option>
            <option value="him">Him only 👨</option>
            <option value="dream">Dream destination ✨</option>
        </select></div>
        <div class="form-group"><label>Year Visited / Target Year</label><input type="number" id="destYear" placeholder="2024"></div>
        <div class="form-group"><label>Memory / Note</label><textarea id="destMemory" rows="3" placeholder="Our favorite memory here..."></textarea></div>
        <div class="form-group"><label>Photo URL (optional)</label><input type="text" id="destPhoto" placeholder="https://..."></div>
        <div class="photo-preview" id="photoPreview"></div>
        <div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveDestination()">Save</button></div>
    </div>
</div>

<script>
    let destinations = [
        { id: 1, name: "Paris, France", lat: 48.8566, lng: 2.3522, type: "together", year: 2023, memory: "First international trip together! Eiffel Tower at sunset was magical.", photo: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=300" },
        { id: 2, name: "Tokyo, Japan", lat: 35.6762, lng: 139.6503, type: "me", year: 2024, memory: "Solo adventure - cherry blossoms and sushi dreams", photo: "https://images.unsplash.com/photo-1536098561742-ca998e48cbcc?w=300" },
        { id: 3, name: "Barcelona, Spain", lat: 41.3851, lng: 2.1734, type: "him", year: 2023, memory: "Gaudí architecture and tapas bars", photo: "https://images.unsplash.com/photo-1583422409516-2895a77efded?w=300" },
        { id: 4, name: "Santorini, Greece", lat: 36.3932, lng: 25.4615, type: "dream", year: null, memory: "Our dream honeymoon destination! White buildings, blue domes, sunset views.", photo: "https://images.unsplash.com/photo-1533105079780-92b9be482077?w=300" },
        { id: 5, name: "Rome, Italy", lat: 41.9028, lng: 12.4964, type: "together", year: 2024, memory: "Ate our weight in pasta and threw coins in Trevi Fountain", photo: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=300" },
        { id: 6, name: "Bali, Indonesia", lat: -8.3405, lng: 115.092, type: "dream", year: null, memory: "Rice terraces, temples, and yoga retreats", photo: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=300" }
    ];
    let map, markers = [], nextId = 7;
    let chart;

    function initMap() {
        map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
        updateMarkers();
    }

    function getMarkerColor(type) {
        if (type === 'together') return '#4a9b6e';
        if (type === 'me') return '#5b8cc9';
        if (type === 'him') return '#e8a34b';
        return '#d4af37';
    }

    function updateMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        destinations.forEach(d => {
            if (d.lat && d.lng && d.type !== 'dream') {
                const marker = L.marker([d.lat, d.lng], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="background: ${getMarkerColor(d.type)}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"></div>`,
                        iconSize: [14, 14]
                    })
                }).addTo(map);
                marker.bindPopup(`<b>${d.name}</b><br>${d.type === 'together' ? '❤️ Together' : d.type === 'me' ? '👩 You' : '👨 Him'}<br>${d.year || ''}<br>${d.memory?.substring(0, 80)}`);
                markers.push(marker);
            }
        });
    }

    function updateStats() {
        document.getElementById('togetherCount').textContent = destinations.filter(d => d.type === 'together').length;
        document.getElementById('meCount').textContent = destinations.filter(d => d.type === 'me').length;
        document.getElementById('himCount').textContent = destinations.filter(d => d.type === 'him').length;
        document.getElementById('dreamCount').textContent = destinations.filter(d => d.type === 'dream').length;
    }

    function renderFeatured() {
        const recent = [...destinations].filter(d => d.type !== 'dream').slice(-4).reverse();
        document.getElementById('featuredList').innerHTML = recent.map(d => `
            <div class="destination-item" onclick="openEditModal(${d.id})">
                <div><span class="destination-badge badge-${d.type}"></span><strong>${d.name}</strong><br><small style="color:#9e9b92">${d.year || 'No date'} · ${d.type === 'together' ? 'Together' : d.type === 'me' ? 'Your solo trip' : 'His solo trip'}</small></div>
                <div><i class="fas fa-chevron-right" style="color:#c9a88b"></i></div>
            </div>
        `).join('');
    }

    function renderAllDestinations(filter = 'all') {
        let filtered = destinations;
        if (filter !== 'all') filtered = destinations.filter(d => d.type === filter);
        document.getElementById('allDestinationsList').innerHTML = filtered.map(d => `
            <div class="destination-item" onclick="openEditModal(${d.id})">
                <div><span class="destination-badge badge-${d.type}"></span><strong>${d.name}</strong><br><small>${d.year || 'TBD'} · ${d.memory?.substring(0, 60) || 'No memory yet'}</small></div>
                <div><i class="fas fa-edit" style="color:#c9a88b"></i></div>
            </div>
        `).join('');
    }

    function renderBucketList() {
        const dreams = destinations.filter(d => d.type === 'dream');
        document.getElementById('bucketListContainer').innerHTML = dreams.map(d => `
            <div class="destination-item" onclick="openEditModal(${d.id})">
                <div><span class="destination-badge badge-dream"></span><strong>⭐ ${d.name}</strong><br><small>Dream destination · ${d.memory?.substring(0, 60) || 'On our bucket list!'}</small></div>
                <div><i class="fas fa-star" style="color:#d4af37"></i></div>
            </div>
        `).join('');
        if (dreams.length === 0) document.getElementById('bucketListContainer').innerHTML = '<p style="text-align:center; padding:40px;">No dream destinations yet. Add your first! ✨</p>';
    }

    function updateChart() {
        const types = ['together', 'me', 'him', 'dream'];
        const counts = types.map(t => destinations.filter(d => d.type === t).length);
        if (chart) chart.destroy();
        const ctx = document.getElementById('travelChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Together ❤️', 'You Alone 👩', 'Him Alone 👨', 'Dream ✨'], datasets: [{ data: counts, backgroundColor: ['#4a9b6e', '#5b8cc9', '#e8a34b', '#d4af37'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
        const total = counts.reduce((a,b) => a+b, 0);
        document.getElementById('statDetails').innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px;"><div><i class="fas fa-globe"></i> Total Adventures: ${total}</div><div><i class="fas fa-heart"></i> Together: ${counts[0]}</div><div><i class="fas fa-female"></i> Solo You: ${counts[1]}</div><div><i class="fas fa-male"></i> Solo Him: ${counts[2]}</div><div><i class="fas fa-star"></i> Dreams: ${counts[3]}</div></div>`;
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Add Destination';
        document.getElementById('destName').value = '';
        document.getElementById('destType').value = 'together';
        document.getElementById('destYear').value = '';
        document.getElementById('destMemory').value = '';
        document.getElementById('destPhoto').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        window.editId = null;
        document.getElementById('destinationModal').classList.add('active');
    }

    function openAddModalWithType(type) {
        openAddModal();
        document.getElementById('destType').value = type;
    }

    function openEditModal(id) {
        const d = destinations.find(x => x.id === id);
        if (!d) return;
        document.getElementById('modalTitle').innerText = 'Edit Destination';
        document.getElementById('destName').value = d.name;
        document.getElementById('destType').value = d.type;
        document.getElementById('destYear').value = d.year || '';
        document.getElementById('destMemory').value = d.memory || '';
        document.getElementById('destPhoto').value = d.photo || '';
        if (d.photo) document.getElementById('photoPreview').innerHTML = `<img src="${d.photo}" style="width:100%; height:100%; object-fit:cover;">`;
        else document.getElementById('photoPreview').innerHTML = '';
        window.editId = id;
        document.getElementById('destinationModal').classList.add('active');
    }

    function saveDestination() {
        const name = document.getElementById('destName').value;
        const type = document.getElementById('destType').value;
        const year = document.getElementById('destYear').value;
        const memory = document.getElementById('destMemory').value;
        const photo = document.getElementById('destPhoto').value;
        if (!name) { alert('Please enter a destination name'); return; }
        
        // Simple geocoding simulation - in real app you'd use a geocoding API
        const mockCoords = { lat: (Math.random() * 170 - 85), lng: (Math.random() * 360 - 180) };
        
        if (window.editId) {
            const index = destinations.findIndex(x => x.id === window.editId);
            if (index !== -1) {
                destinations[index] = { ...destinations[index], name, type, year: year || null, memory, photo, lat: mockCoords.lat, lng: mockCoords.lng };
            }
        } else {
            destinations.push({ id: nextId++, name, type, year: year || null, memory, photo, lat: mockCoords.lat, lng: mockCoords.lng });
        }
        closeModal();
        refreshAll();
    }

    function deleteDestination(id) {
        if (confirm('Remove this destination?')) {
            destinations = destinations.filter(d => d.id !== id);
            refreshAll();
        }
    }

    function closeModal() { document.getElementById('destinationModal').classList.remove('active'); }

    function refreshAll() {
        updateStats();
        updateMarkers();
        renderFeatured();
        renderAllDestinations(currentFilter);
        renderBucketList();
        updateChart();
        localStorage.setItem('coupleTravelMap', JSON.stringify(destinations));
    }

    let currentFilter = 'all';
    document.querySelectorAll('#destinationFilters .filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('#destinationFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderAllDestinations(currentFilter);
        };
    });

    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageName + 'Page').classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if (pageName === 'map') { setTimeout(() => map?.invalidateSize(), 100); }
        if (pageName === 'stats') updateChart();
        if (pageName === 'destinations') renderAllDestinations(currentFilter);
    }

    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.onclick = () => showPage(btn.getAttribute('data-page'));
    });

    const saved = localStorage.getItem('coupleTravelMap');
    if (saved) destinations = JSON.parse(saved);
    nextId = Math.max(...destinations.map(d => d.id), 0) + 1;

    setTimeout(() => { initMap(); refreshAll(); }, 100);
</script>
</body>
</html>
